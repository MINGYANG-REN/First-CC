<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0a0812;
            color: #f0e6ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            margin-bottom: 48px;
            color: #b0a0cc;
        }
        .cards {
            display: flex;
            gap: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: #15102a;
            border: 1px solid rgba(167, 139, 250, 0.15);
            border-radius: 16px;
            padding: 40px 44px;
            width: 280px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            border-color: rgba(196, 163, 90, 0.5);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(91, 33, 182, 0.2);
        }
        .card-icon { font-size: 2.4rem; margin-bottom: 16px; }
        .card-title { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 8px; }
        .card-desc { font-size: 0.85rem; color: #b0a0cc; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MINGYANG REN</h1>
        <div class="cards">
            <a href="rmy/" class="card">
                <div class="card-icon">👤</div>
                <div class="card-title">个人主页</div>
                <div class="card-desc">关于我的一切——教育、爱好、乐队与生活</div>
            </a>
            <a href="what-eat-today/" class="card">
                <div class="card-icon">🍜</div>
                <div class="card-title">今天吃什么</div>
                <div class="card-desc">帮你解决选择困难，随机推荐美食</div>
            </a>
        </div>
    </div>
</body>
</html>
